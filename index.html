<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GargantuaLab — Sito in allestimento</title>
<meta name="description" content="GargantuaLab — sito in allestimento.">
<meta name="theme-color" content="#e9d8bf">
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="assets/logo-64.png">
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    background:#e9d8bf;
    color:#171717;
    font-family:-apple-system, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    position:relative;
    overflow:hidden;
  }

  .logo{
    position:absolute;
    top:clamp(24px, 5vh, 56px);
    left:clamp(24px, 5vw, 64px);
    width:clamp(70px, 8vw, 104px);
    height:auto;
    display:block;
  }

  .title{
    position:absolute;
    top:46%;
    left:16%;
    transform:translateY(-50%);
  }
  .title h1{
    margin:0;
    font-size:clamp(2.6rem, 8vw, 5.5rem);
    font-weight:800;
    letter-spacing:-0.01em;
    line-height:1;
  }
  .title .sub{
    margin:10px 0 0;
    font-size:clamp(1rem, 2.6vw, 1.6rem);
    font-weight:400;
    color:#2a2a2a;
  }

  .contatti{
    position:absolute;
    top:72%;
    left:48%;
  }
  .contatti h2{
    margin:0;
    font-size:clamp(1.8rem, 5vw, 3.4rem);
    font-weight:800;
    line-height:1;
  }
  .contatti a{
    display:inline-block;
    margin-top:8px;
    font-size:clamp(0.95rem, 2vw, 1.3rem);
    color:#171717;
    text-decoration:none;
  }
  .contatti a:hover{ text-decoration:underline; }

  @media (max-width: 720px){
    body{ overflow:auto; }
    .logo{ position:static; margin:clamp(24px,6vw,40px) auto 0; }
    .title{
      position:static;
      transform:none;
      text-align:center;
      margin:14vh auto 0;
      padding:0 24px;
    }
    .contatti{
      position:static;
      text-align:center;
      margin:16vh auto 10vh;
      padding:0 24px;
    }
  }
</style>
</head>
<body>
  <img class="logo" src="assets/logo-480.png" alt="GargantuaLab">
  <div class="title">
    <h1>GargantuaLab</h1>
    <p class="sub">sito in allestimento</p>
  </div>
  <div class="contatti">
    <h2>contatti</h2>
    <a href="mailto:applicazioni.st@gmail.com">applicazioni.st@gmail.com</a>
  </div>
</body>
</html>
